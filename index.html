<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Racers 3D</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: Arial, sans-serif;
            overflow: hidden;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        /* MENU - VISIBLE BY DEFAULT */
        #menu {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            z-index: 1000;
            width: 90%;
            max-width: 500px;
        }

        #menu h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
            animation: bounce 2s infinite;
        }

        #menu h2 {
            font-size: 1.3em;
            margin-bottom: 40px;
            opacity: 0.9;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .btn {
            display: block;
            width: 100%;
            padding: 18px 30px;
            margin: 15px 0;
            font-size: 1.3em;
            font-weight: bold;
            color: white;
            background: linear-gradient(145deg, #ff6b6b, #ee5a24);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 8px 20px rgba(238, 90, 36, 0.4);
            text-transform: uppercase;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(238, 90, 36, 0.6);
        }

        .btn.green {
            background: linear-gradient(145deg, #4ecdc4, #44a08d);
            box-shadow: 0 8px 20px rgba(78, 205, 196, 0.4);
        }

        /* CHARACTER SELECT */
        #charSelect {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            z-index: 1000;
            width: 95%;
            max-width: 600px;
            display: none;
        }

        #charSelect h2 { font-size: 2em; margin-bottom: 25px; }

        .charGrid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .charCard {
            background: rgba(255,255,255,0.15);
            border-radius: 20px;
            padding: 20px 10px;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all 0.3s;
        }

        .charCard:hover, .charCard.sel { 
            transform: translateY(-5px);
            border-color: #ffd700;
            background: rgba(255,255,255,0.25);
        }

        .charIcon { font-size: 3em; margin-bottom: 10px; }
        .charName { font-weight: bold; }
        .charSpeed { font-size: 0.85em; opacity: 0.8; margin-top: 5px; }

        /* GAME CANVAS */
        #gameCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: none;
            z-index: 1;
        }

        /* HUD */
        #hud {
            position: fixed;
            top: 10px;
            left: 10px;
            right: 10px;
            display: none;
            justify-content: space-between;
            z-index: 100;
            pointer-events: none;
        }

        .hudBox {
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 25px;
            color: white;
            font-size: 1.1em;
            font-weight: bold;
            display: inline-block;
        }

        .hudBox span { color: #ffd700; }

        /* CONTROLS */
        #controls {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            display: none;
            justify-content: center;
            gap: 30px;
            z-index: 100;
            padding: 0 20px;
        }

        .ctrlBtn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            font-size: 2em;
            cursor: pointer;
            user-select: none;
            touch-action: manipulation;
        }

        .ctrlBtn:active { transform: scale(0.9); }

        #leftCtrl { background: linear-gradient(145deg, #ff6b6b, #ee5a24); color: white; }
        #rightCtrl { background: linear-gradient(145deg, #4ecdc4, #44a08d); color: white; }
        #jumpCtrl { 
            background: linear-gradient(145deg, #a55eea, #8854d0); 
            color: white; 
            width: 100px; 
            height: 100px; 
            font-size: 1.5em; 
        }

        /* PROGRESS */
        #progressBar {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 400px;
            display: none;
            z-index: 100;
        }

        #progressTrack {
            width: 100%;
            height: 20px;
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.3);
        }

        #progressFill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            transition: width 0.3s;
        }

        #distText {
            text-align: center;
            color: white;
            margin-top: 8px;
            font-size: 1em;
        }

        /* RESULTS */
        #results {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            background: rgba(0,0,0,0.9);
            padding: 40px 30px;
            border-radius: 30px;
            z-index: 1000;
            width: 90%;
            max-width: 450px;
            display: none;
        }

        #results h2 { font-size: 2.5em; color: #ffd700; margin-bottom: 10px; }
        .stat { font-size: 1.3em; margin: 15px 0; }
        .stat span { color: #00d2ff; font-weight: bold; }
        .medal { font-size: 5em; margin: 20px 0; }

        @media (max-width: 600px) {
            #menu h1 { font-size: 2.2em; }
            .ctrlBtn { width: 70px; height: 70px; }
            #jumpCtrl { width: 85px; height: 85px; }
        }
    </style>
</head>
<body>

<!-- MAIN MENU - ALWAYS VISIBLE FIRST -->
<div id="menu">
    <h1>🏆 Mini Racers 3D</h1>
    <h2>Championship Edition</h2>
    <button class="btn" onclick="showChars()">🎮 PLAY NOW</button>
    <button class="btn green" onclick="alert('⬅️➡️ Move | ⬆️ Jump | 🪙 Collect coins')">📖 HOW TO PLAY</button>
</div>

<!-- CHARACTER SELECT -->
<div id="charSelect">
    <h2>Choose Your Racer</h2>
    <div class="charGrid">
        <div class="charCard sel" onclick="pickChar(0)">
            <div class="charIcon">🏃</div>
            <div class="charName">Speedy</div>
            <div class="charSpeed">⚡ Fast</div>
        </div>
        <div class="charCard" onclick="pickChar(1)">
            <div class="charIcon">🦊</div>
            <div class="charName">Fox</div>
            <div class="charSpeed">🎯 Balanced</div>
        </div>
        <div class="charCard" onclick="pickChar(2)">
            <div class="charIcon">🐰</div>
            <div class="charName">Bunny</div>
            <div class="charSpeed">🦘 High Jump</div>
        </div>
        <div class="charCard" onclick="pickChar(3)">
            <div class="charIcon">🤖</div>
            <div class="charName">Robot</div>
            <div class="charSpeed">🛡️ Shield</div>
        </div>
        <div class="charCard" onclick="pickChar(4)">
            <div class="charIcon">👽</div>
            <div class="charName">Alien</div>
            <div class="charSpeed">👾 Mystery</div>
        </div>
        <div class="charCard" onclick="pickChar(5)">
            <div class="charIcon">🦸</div>
            <div class="charName">Hero</div>
            <div class="charSpeed">💫 Super</div>
        </div>
    </div>
    <button class="btn" onclick="startGame()">🚀 START RACE!</button>
    <button class="btn green" onclick="backToMenu()">← BACK</button>
</div>

<!-- CANVAS FOR 2D/3D RENDERING -->
<canvas id="gameCanvas"></canvas>

<!-- HUD -->
<div id="hud">
    <div class="hudBox">🪙 <span id="coins">0</span></div>
    <div class="hudBox">⏱️ <span id="time">0:00</span></div>
    <div class="hudBox">📍 <span id="dist">0m</span> / 500m</div>
</div>

<!-- PROGRESS BAR -->
<div id="progressBar">
    <div id="progressTrack"><div id="progressFill"></div></div>
    <div id="distText">Race to 500 meters!</div>
</div>

<!-- CONTROLS -->
<div id="controls">
    <button class="ctrlBtn" id="leftCtrl">⬅️</button>
    <button class="ctrlBtn" id="jumpCtrl">⬆️</button>
    <button class="ctrlBtn" id="rightCtrl">➡️</button>
</div>

<!-- RESULTS -->
<div id="results">
    <h2>🎉 Race Complete!</h2>
    <div class="medal" id="medal">🥇</div>
    <div class="stat">Time: <span id="finalTime">0:00</span></div>
    <div class="stat">Coins: <span id="finalCoins">0</span> 🪙</div>
    <div class="stat">Score: <span id="finalScore">0</span></div>
    <button class="btn" onclick="restart()" style="margin-top:20px;">🔄 RACE AGAIN</button>
    <button class="btn green" onclick="backToMenu()">🏠 MENU</button>
</div>

<script>
// ============================================
// GAME STATE - Initialize BEFORE anything else
// ============================================
console.log('=== MINI RACERS 3D LOADING ===');

let selectedChar = 0;
let gameState = 'menu'; // menu, playing, finished
let isPlaying = false;

// Game variables
let playerX = 0;
let playerY = 0;
let playerVelY = 0;
let distance = 0;
let totalDist = 500;
let coinCount = 0;
let gameTime = 0;
let score = 0;
let speed = 5;
let baseSpeed = 5;
let moveDir = 0;
let isJumping = false;

// Game objects
let obstacles = [];
let coins = [];
let trees = [];

// Canvas & Context
let canvas, ctx;
let animFrameId;

// Character colors
const charColors = ['#ff6b6b', '#ff9f43', '#ffecd2', '#74b9ff', '#a29bfe', '#fd79a8'];

// ============================================
// INITIALIZATION - Runs when page loads
// ============================================
window.onload = function() {
    console.log('Page loaded!');
    
    try {
        // Get canvas
        canvas = document.getElementById('gameCanvas');
        ctx = canvas.getContext('2d');
        
        // Set canvas size
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        // Setup controls
        setupControls();
        
        console.log('✅ Game initialized successfully!');
        console.log('✅ Canvas ready:', canvas.width + 'x' + canvas.height);
        
    } catch(e) {
        console.error('❌ Init error:', e);
        alert('Error: ' + e.message);
    }
};

function resizeCanvas() {
    if(canvas) {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
}

// ============================================
// UI FUNCTIONS
// ============================================
function showChars() {
    document.getElementById('menu').style.display = 'none';
    document.getElementById('charSelect').style.display = 'block';
}

function pickChar(index) {
    selectedChar = index;
    document.querySelectorAll('.charCard').forEach((card, i) => {
        card.classList.toggle('sel', i === index);
    });
}

function backToMenu() {
    // Stop game
    isPlaying = false;
    if(animFrameId) cancelAnimationFrame(animFrameId);
    
    // Show menu
    document.getElementById('menu').style.display = 'block';
    document.getElementById('charSelect').style.display = 'none';
    document.getElementById('gameCanvas').style.display = 'none';
    document.getElementById('hud').style.display = 'none';
    document.getElementById('controls').style.display = 'none';
    document.getElementById('progressBar').style.display = 'none';
    document.getElementById('results').style.display = 'none';
    
    // Reset
    resetGame();
}

function startGame() {
    console.log('Starting game...');
    
    // Hide menus
    document.getElementById('charSelect').style.display = 'none';
    document.getElementById('menu').style.display = 'none';
    
    // Show game elements
    document.getElementById('gameCanvas').style.display = 'block';
    document.getElementById('hud').style.display = 'flex';
    document.getElementById('controls').style.display = 'flex';
    document.getElementById('progressBar').style.display = 'block';
    
    // Reset and start
    resetGame();
    isPlaying = true;
    gameState = 'playing';
    
    // Start game loop
    gameLoop();
}

function resetGame() {
    playerX = 0;
    playerY = 0;
    playerVelY = 0;
    distance = 0;
    coinCount = 0;
    gameTime = 0;
    score = 0;
    speed = baseSpeed;
    isJumping = false;
    moveDir = 0;
    
    obstacles = [];
    coins = [];
    trees = [];
    
    // Generate initial trees
    for(let i = 0; i < 20; i++) {
        trees.push({
            x: (Math.random() > 0.5 ? 1 : -1) * (150 + Math.random() * 200),
            y: -i * 100 - Math.random() * 50,
            size: 40 + Math.random() * 30
        });
    }
    
    updateHUD();
}

function restart() {
    document.getElementById('results').style.display = 'none';
    startGame();
}

// ============================================
// CONTROLS
// ============================================
function setupControls() {
    const leftBtn = document.getElementById('leftCtrl');
    const rightBtn = document.getElementById('rightCtrl');
    const jumpBtn = document.getElementById('jumpCtrl');
    
    // Left button
    leftBtn.addEventListener('touchstart', (e) => { e.preventDefault(); moveDir = -1; });
    leftBtn.addEventListener('touchend', (e) => { e.preventDefault(); if(moveDir === -1) moveDir = 0; });
    leftBtn.addEventListener('mousedown', () => moveDir = -1);
    leftBtn.addEventListener('mouseup', () => { if(moveDir === -1) moveDir = 0; });
    leftBtn.addEventListener('mouseleave', () => { if(moveDir === -1) moveDir = 0; });
    
    // Right button
    rightBtn.addEventListener('touchstart', (e) => { e.preventDefault(); moveDir = 1; });
    rightBtn.addEventListener('touchend', (e) => { e.preventDefault(); if(moveDir === 1) moveDir = 0; });
    rightBtn.addEventListener('mousedown', () => moveDir = 1);
    rightBtn.addEventListener('mouseup', () => { if(moveDir === 1) moveDir = 0; });
    rightBtn.addEventListener('mouseleave', () => { if(moveDir === 1) moveDir = 0; });
    
    // Jump button
    jumpBtn.addEventListener('touchstart', (e) => { e.preventDefault(); doJump(); });
    jumpBtn.addEventListener('click', () => doJump());
    
    // Keyboard
    document.addEventListener('keydown', (e) => {
        if(!isPlaying) return;
        if(e.key === 'ArrowLeft' || e.key === 'a') moveDir = -1;
        if(e.key === 'ArrowRight' || e.key === 'd') moveDir = 1;
        if(e.key === ' ' || e.key === 'ArrowUp' || e.key === 'w') doJump();
    });
    
    document.addEventListener('keyup', (e) => {
        if(e.key === 'ArrowLeft' || e.key === 'a') if(moveDir === -1) moveDir = 0;
        if(e.key === 'ArrowRight' || e.key === 'd') if(moveDir === 1) moveDir = 0;
    });
}

function doJump() {
    if(!isJumping && isPlaying) {
        isJumping = true;
        playerVelY = -15;
    }
}

// ============================================
// GAME LOOP
// ============================================
let lastTime = 0;

function gameLoop(timestamp) {
    if(!isPlaying) return;
    
    animFrameId = requestAnimationFrame(gameLoop);
    
    const dt = Math.min((timestamp - lastTime) / 1000, 0.1); // Cap delta time
    lastTime = timestamp;
    
    update(dt);
    render();
}

function update(dt) {
    // Update time
    gameTime += dt;
    
    // Update distance
    distance += speed * dt;
    
    // Increase difficulty
    if(Math.floor(distance) % 100 === 0 && distance > 0) {
        baseSpeed = Math.min(baseSpeed + 0.2, 12);
        speed = baseSpeed;
    }
    
    // Player movement
    if(moveDir !== 0) {
        playerX += moveDir * 300 * dt;
        playerX = Math.max(-150, Math.min(150, playerX));
    }
    
    // Jump physics
    if(isJumping) {
        playerY += playerVelY * dt;
        playerVelY += 40 * dt; // Gravity
        
        if(playerY >= 0) {
            playerY = 0;
            isJumping = false;
            playerVelY = 0;
        }
    }
    
    // Spawn obstacles
    if(obstacles.length < 8 && Math.random() < 0.02) {
        const lanes = [-150, 0, 150];
        obstacles.push({
            x: lanes[Math.floor(Math.random() * 3)],
            y: -800,
            type: Math.floor(Math.random() * 3), // 0=barrier, 1=cone, 2=rock
            hit: false
        });
    }
    
    // Spawn coins
    if(coins.length < 12 && Math.random() < 0.04) {
        const lanes = [-150, 0, 150];
        coins.push({
            x: lanes[Math.floor(Math.random() * 3)],
            y: -800,
            collected: false,
            rot: 0
        });
    }
    
    // Update obstacles
    for(let i = obstacles.length - 1; i >= 0; i--) {
        obstacles[i].y += speed * 60 * dt;
        
        // Remove if off screen
        if(obstacles[i].y > canvas.height + 100) {
            obstacles.splice(i, 1);
            continue;
        }
        
        // Collision check
        if(!obstacles[i].hit && checkCollision(obstacles[i])) {
            obstacles[i].hit = true;
            speed = baseSpeed * 0.5;
            setTimeout(() => { if(isPlaying) speed = baseSpeed; }, 800);
        }
    }
    
    // Update coins
    for(let i = coins.length - 1; i >= 0; i--) {
        coins[i].y += speed * 60 * dt;
        coins[i].rot += 0.05;
        
        // Remove if off screen
        if(coins[i].y > canvas.height + 100) {
            coins.splice(i, 1);
            continue;
        }
        
        // Collection check
        if(!coins[i].collected && checkCoinCollision(coins[i])) {
            coins[i].collected = true;
            coinCount++;
            score += 10;
            coins.splice(i, 1);
        }
    }
    
    // Update trees
    for(let tree of trees) {
        tree.y += speed * 30 * dt;
        if(tree.y > canvas.height + 100) {
            tree.y -= 2000;
            tree.x = (Math.random() > 0.5 ? 1 : -1) * (150 + Math.random() * 200);
        }
    }
    
    // Update HUD
    updateHUD();
    
    // Check win condition
    if(distance >= totalDist) {
        endGame();
    }
}

function checkCollision(obs) {
    const dx = playerX - obs.x;
    const dy = playerY - obs.y;
    return Math.abs(dx) < 40 && Math.abs(dy) < 50 && !isJumping;
}

function checkCoinCollision(coin) {
    const dx = playerX - coin.x;
    const dy = playerY - coin.y;
    return Math.sqrt(dx*dx + dy*dy) < 50;
}

function updateHUD() {
    const mins = Math.floor(gameTime / 60);
    const secs = Math.floor(gameTime % 60);
    document.getElementById('time').textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
    document.getElementById('coins').textContent = coinCount;
    document.getElementById('dist').textContent = Math.round(distance) + 'm';
    document.getElementById('progressFill').style.width = (distance / totalDist * 100) + '%';
}

function endGame() {
    isPlaying = false;
    score += Math.max(0, Math.round((60 - gameTime) * 10));
    
    let medal = '🥉';
    if(gameTime < 35) medal = '🥇';
    else if(gameTime < 45) medal = '🥈';
    
    document.getElementById('medal').textContent = medal;
    
    const mins = Math.floor(gameTime / 60);
    const secs = Math.floor(gameTime % 60);
    document.getElementById('finalTime').textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
    document.getElementById('finalCoins').textContent = coinCount;
    document.getElementById('finalScore').textContent = score;
    
    document.getElementById('hud').style.display = 'none';
    document.getElementById('controls').style.display = 'none';
    document.getElementById('progressBar').style.display = 'none';
    document.getElementById('results').style.display = 'block';
}

// ============================================
// RENDERING (2D Canvas)
// ============================================
function render() {
    // Clear canvas
    ctx.fillStyle = '#87ceeb';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Draw ground
    ctx.fillStyle = '#7cba5f';
    ctx.fillRect(0, canvas.height * 0.6, canvas.width, canvas.height * 0.4);
    
    // Draw track
    ctx.fillStyle = '#555555';
    ctx.fillRect(canvas.width/2 - 200, canvas.height * 0.55, 400, canvas.height * 0.45);
    
    // Draw lane lines
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 3;
    ctx.setLineDash([20, 20]);
    
    [canvas.width/2 - 100, canvas.width/2, canvas.width/2 + 100].forEach(x => {
        ctx.beginPath();
        ctx.moveTo(x, canvas.height * 0.55);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
    });
    ctx.setLineDash([]);
    
    // Draw trees (background)
    ctx.fillStyle = '#228b22';
    for(let tree of trees) {
        drawTree(tree.x + canvas.width/2, tree.y + canvas.height * 0.65, tree.size);
    }
    
    // Draw coins
    for(let coin of coins) {
        if(!coin.collected) {
            drawCoin(coin.x + canvas.width/2, coin.y + canvas.height * 0.65, coin.rot);
        }
    }
    
    // Draw obstacles
    for(let obs of obstacles) {
        drawObstacle(obs.x + canvas.width/2, obs.y + canvas.height * 0.65, obs.type);
    }
    
    // Draw player
    drawPlayer(canvas.width/2 + playerX, canvas.height * 0.65 + playerY);
}

function drawTree(x, y, size) {
    // Trunk
    ctx.fillStyle = '#8b4513';
    ctx.fillRect(x - size*0.15, y - size*0.5, size*0.3, size*0.8);
    
    // Leaves
    ctx.fillStyle = '#228b22';
    ctx.beginPath();
    ctx.moveTo(x, y - size);
    ctx.lineTo(x + size*0.7, y - size*0.2);
    ctx.lineTo(x - size*0.7, y - size*0.2);
    ctx.closePath();
    ctx.fill();
}

function drawCoin(x, y, rot) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(rot);
    
    // Coin body
    ctx.fillStyle = '#ffd700';
    ctx.beginPath();
    ctx.ellipse(0, 0, 25, 10, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Inner circle
    ctx.fillStyle = '#ffaa00';
    ctx.beginPath();
    ctx.ellipse(0, 0, 17, 7, 0, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.restore();
}

function drawObstacle(x, y, type) {
    if(type === 0) { // Barrier
        ctx.fillStyle = '#ff4444';
        ctx.fillRect(x - 40, y - 30, 80, 60);
        ctx.fillStyle = '#ffffff';
        for(let i = 0; i < 3; i++) {
            ctx.fillRect(x - 38, y - 25 + i * 20, 76, 8);
        }
    } else if(type === 1) { // Cone
        ctx.fillStyle = '#ff6600';
        ctx.beginPath();
        ctx.moveTo(x, y - 35);
        ctx.lineTo(x + 25, y + 15);
        ctx.lineTo(x - 25, y + 15);
        ctx.closePath();
        ctx.fill();
        
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(x, y - 5, 15, 0, Math.PI, true);
        ctx.stroke();
    } else { // Rock
        ctx.fillStyle = '#888888';
        ctx.beginPath();
        ctx.moveTo(x - 25, y + 15);
        ctx.lineTo(x - 15, y - 20);
        ctx.lineTo(x + 15, y - 25);
        ctx.lineTo(x + 25, y + 10);
        ctx.closePath();
        ctx.fill();
    }
}

function drawPlayer(x, y) {
    const color = charColors[selectedChar];
    
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(x, y + 35, 25, 10, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Legs
    ctx.fillStyle = '#333333';
    const legOffset = isPlaying ? Math.sin(Date.now() * 0.01 * speed) * 10 : 0;
    ctx.fillRect(x - 18, y + 5, 14, 35 + legOffset);
    ctx.fillRect(x + 4, y + 5, 14, 35 - legOffset);
    
    // Body
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(x - 22, y - 40, 44, 70, 15);
    ctx.fill();
    
    // Head
    ctx.fillStyle = '#ffdbac';
    ctx.beginPath();
    ctx.arc(x, y - 55, 22, 0, Math.PI * 2);
    ctx.fill();
    
    // Eyes
    ctx.fillStyle = '#000000';
    ctx.beginPath();
    ctx.arc(x - 8, y - 58, 4, 0, Math.PI * 2);
    ctx.arc(x + 8, y - 58, 4, 0, Math.PI * 2);
    ctx.fill();
    
    // Smile
    ctx.strokeStyle = '#000000';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(x, y - 52, 8, 0.2, Math.PI - 0.2);
    ctx.stroke();
    
    // Arms
    ctx.fillStyle = color;
    const armOffset = isPlaying ? Math.sin(Date.now() * 0.01 * speed) * 8 : 0;
    ctx.save();
    ctx.translate(x - 28, y - 25);
    ctx.rotate((armOffset * 0.03) - 0.3);
    ctx.fillRect(-6, 0, 12, 35);
    ctx.restore();
    
    ctx.save();
    ctx.translate(x + 28, y - 25);
    ctx.rotate((-armOffset * 0.03) + 0.3);
    ctx.fillRect(-6, 0, 12, 35);
    ctx.restore();
}
